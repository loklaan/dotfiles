# runtime-tiers.yaml — declarative manifest of every runnable in this repo.
#
# Merged into chezmoi template data at apply time under the `runtimeTiers` key,
# so `{{ .runtimeTiers.runnables }}` is the canonical list. The runtime-tier
# linter (Task 2) reads THIS source file directly, not a deployed copy.
#
# Schema (one entry per runnable):
#   path    chezmoi SOURCE path, relative to repo root (keeps executable_/.tmpl)
#   tier    bootstrap | runtime | na
#             bootstrap = runs before/during deno install in 050-install-packages
#             runtime   = runs after deno is available (deno tools + bash candidates)
#             na        = not a tiered runnable (stubs, sourced libs)
#   lang    bash | deno | stub  — derived from the file's ACTUAL line-1 shebang:
#             `deno run`        -> deno
#             bash / sh / uv    -> bash
#             mise tool-stub    -> stub
#             zsh-only / none   -> bash
#   sourced present (true) ONLY for libs that are sourced, never executed directly.
#
# NOTE: lang reflects the real shebang read from disk. Several lib files and
# executable_github-token.tmpl carry a `#!/usr/bin/env bash` shebang (zsh libs
# resolve to bash per the rule above), so their lang is `bash`, not `stub`. The
# only genuine stub is executable_d2.tmpl (a mise tool-stub).

runtimeTiers:
  runnables:
    # --- repo root (1) ---
    - path: install.sh
      tier: bootstrap
      lang: bash

    # --- home/private_dot_local/bin (21) ---
    - path: home/private_dot_local/bin/executable_cw
      tier: runtime
      lang: deno
    - path: home/private_dot_local/bin/executable_d2.tmpl
