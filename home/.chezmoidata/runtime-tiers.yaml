      lang: deno
    - path: home/private_dot_local/bin/executable_df-lint-runtimes
      tier: runtime
      lang: deno
    - path: home/private_dot_local/bin/executable_df-omo-profile
      tier: runtime
      lang: deno
    - path: home/private_dot_local/bin/executable_df-orca-pair
      tier: runtime
      lang: deno
    - path: home/private_dot_local/bin/executable_df-orca-serve
      tier: runtime
      lang: deno
    - path: home/private_dot_local/bin/executable_df-prewarm
      tier: runtime
