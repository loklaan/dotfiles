    # --- home/.chezmoiscripts (19) ---
    #
    # POLICY: The post-050 chezmoiscripts (056 and above) are INTENTIONALLY
    # tier:runtime / lang:bash — this is deliberate policy, NOT a conversion backlog.
    # Rationale: deno cold-start latency on every-apply, run_onchange hash churn from
    # deno import maps, and unattended-exec risk outweigh any benefit for lifecycle glue.
    # Only run_before_install-060 (before_install phase) is bootstrap.
    #
    - path: home/.chezmoiscripts/run_after_install-050-install-packages.sh.tmpl
      tier: bootstrap
      lang: bash
    - path: home/.chezmoiscripts/run_after_install-056-mcpproxy-daemon.sh.tmpl
